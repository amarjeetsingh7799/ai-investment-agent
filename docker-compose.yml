version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ai_investment_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai_investment_agent
    restart: unless-stopped

  server:
    build: ./server
    container_name: ai_investment_server
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ai_investment_agent
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - PORT=5000
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build: ./client
    container_name: ai_investment_client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
